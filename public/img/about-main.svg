<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <rect width="800" height="1000" fill="#111111"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#g)"/>
  <!-- center cross -->
  <line x1="400" y1="440" x2="400" y2="560" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="500" x2="460" y2="500" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="500" r="5" fill="#731A19" opacity="0.7"/>
  <!-- resolution -->
  <text x="400" y="462" text-anchor="middle" font-size="22" font-weight="600" fill="#FC9933" font-family="Inter,sans-serif">800 × 1000</text>
  <!-- divider -->
  <line x1="360" y1="482" x2="440" y2="482" stroke="#FC9933" stroke-width="0.8" opacity="0.4"/>
  <!-- description -->
  <text x="400" y="510" text-anchor="middle" font-size="15" fill="#F9F7F6" opacity="0.55" font-family="Inter,sans-serif">Территория комплекса Tatyr / горный пейзаж</text>
  <!-- TATYR watermark -->
  <text x="400" y="980" text-anchor="middle" font-size="11" fill="#731A19" opacity="0.4" font-family="serif" letter-spacing="6">about-main.jpg</text>
</svg>