<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1067" viewBox="0 0 800 1067">
  <rect width="800" height="1067" fill="#111111"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="1067" fill="url(#g)"/>
  <!-- center cross -->
  <line x1="400" y1="473.5" x2="400" y2="593.5" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="533.5" x2="460" y2="533.5" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="533.5" r="5" fill="#731A19" opacity="0.7"/>
  <!-- resolution -->
  <text x="400" y="495.5" text-anchor="middle" font-size="22" font-weight="600" fill="#FC9933" font-family="Inter,sans-serif">800 × 1067</text>
  <!-- divider -->
  <line x1="360" y1="515.5" x2="440" y2="515.5" stroke="#FC9933" stroke-width="0.8" opacity="0.4"/>
  <!-- description -->
  <text x="400" y="543.5" text-anchor="middle" font-size="15" fill="#F9F7F6" opacity="0.55" font-family="Inter,sans-serif">Живописная природа вокруг комплекса</text>
  <!-- TATYR watermark -->
  <text x="400" y="1047" text-anchor="middle" font-size="11" fill="#731A19" opacity="0.4" font-family="serif" letter-spacing="6">whyus-nature.jpg</text>
</svg>