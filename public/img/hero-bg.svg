<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#111111"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#g)"/>
  <!-- center cross -->
  <line x1="960" y1="480" x2="960" y2="600" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <line x1="900" y1="540" x2="1020" y2="540" stroke="#731A19" stroke-width="1" opacity="0.5"/>
  <circle cx="960" cy="540" r="5" fill="#731A19" opacity="0.7"/>
  <!-- resolution -->
  <text x="960" y="502" text-anchor="middle" font-size="22" font-weight="600" fill="#FC9933" font-family="Inter,sans-serif">1920 × 1080</text>
  <!-- divider -->
  <line x1="920" y1="522" x2="1000" y2="522" stroke="#FC9933" stroke-width="0.8" opacity="0.4"/>
  <!-- description -->
  <text x="960" y="550" text-anchor="middle" font-size="15" fill="#F9F7F6" opacity="0.55" font-family="Inter,sans-serif">Панорамный вид гор Арашана — фоновое фото</text>
  <text x="960" y="572" text-anchor="middle" font-size="15" fill="#F9F7F6" opacity="0.55" font-family="Inter,sans-serif">главного экрана</text>
  <!-- TATYR watermark -->
  <text x="960" y="1060" text-anchor="middle" font-size="11" fill="#731A19" opacity="0.4" font-family="serif" letter-spacing="6">hero-bg.jpg</text>
</svg>